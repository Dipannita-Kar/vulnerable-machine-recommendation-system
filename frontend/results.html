<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results — CyberPath</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="results-page">

  <!-- NAVIGATION -->
  <nav>
    <a href="index.html" class="nav-logo">Cyber<span>Path</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="recommend.html">Recommend</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <section class="page-header results-header">
    <div class="container">
      <h1>Your Recommendations</h1>
      <p class="text-muted">Based on your preferences, here are the best matching machines</p>
    </div>
  </section>

  <!-- RESULTS SECTION -->
  <section class="results-section">
    <div class="container">

      <!-- STUDENT PREFERENCE SUMMARY -->
      <div class="preference-summary" id="preferenceSummary"></div>

      <!-- MATCH MODE BAR -->
      <div class="match-bar" id="matchBar"></div>

      <!-- RESULTS GRID -->
      <div class="results-grid" id="resultsGrid"></div>

      <!-- BACK BUTTON -->
      <div style="text-align:center; margin-top:3rem; padding-bottom:3rem;">
        <a href="recommend.html" class="btn btn-outline">
          ← Back to Search
        </a>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer footer-light">
    <div class="container">
      <div class="footer-content">
        <span class="nav-logo">Cyber<span>Path</span></span>
        <p style="color:#475569; font-size:0.85rem;">AI-Powered Vulnerable Machine Recommender</p>
      </div>
    </div>
  </footer>

  <script src="main.js"></script>
  <script>
    // Load results from sessionStorage
    const raw      = sessionStorage.getItem('cyberpath_results');
    const inputRaw = sessionStorage.getItem('cyberpath_input');

    if (!raw) { window.location.href = 'recommend.html'; }

    const data  = JSON.parse(raw);
    const input = JSON.parse(inputRaw);

    // ── PREFERENCE SUMMARY ────────────────────────────────────────────────────

    const prefSummary = document.getElementById('preferenceSummary');
    let prefHtml = '<div class="pref-title">You Selected:</div><div class="pref-tags">';

    prefHtml += `<span class="pref-tag pref-required">Difficulty: ${input.difficulty}</span>`;
    prefHtml += `<span class="pref-tag pref-required">OS: ${input.os_pref}</span>`;
    prefHtml += `<span class="pref-tag pref-required">Category: ${input.attack_categories.join(', ')}</span>`;

    if (input.learning_objectives && input.learning_objectives.length > 0) {
        prefHtml += `<span class="pref-tag pref-optional">Objectives: ${input.learning_objectives.join(', ')}</span>`;
    }

    if (input.vuln_type) {
        prefHtml += `<span class="pref-tag pref-optional">Vulnerability: ${input.vuln_type}</span>`;
    }

    if (input.estimated_time) {
        prefHtml += `<span class="pref-tag pref-optional">Time: ${input.estimated_time}</span>`;
    }

    if (input.platform) {
        prefHtml += `<span class="pref-tag pref-optional">Platform: ${input.platform}</span>`;
    }

    prefHtml += '</div>';
    prefSummary.innerHTML = prefHtml;

    // ── MATCH BAR 

    const modeColors = {
        'Exact Match':        '#10b981',
        'Relaxed Difficulty': '#f59e0b',
        'Category Match':     '#00d4ff',
        'Broad Match':        '#f97316',
        'No Match':           '#ef4444'
    };

    const matchBar = document.getElementById('matchBar');
    let matchHtml = `
        <div class="match-item">
            <span class="match-label">Search Mode</span>
            <span class="match-value" style="color:${modeColors[data.match_mode] || '#1e293b'}">
                ${data.match_mode === 'Exact Match' ? 'Standard Search' : data.match_mode}
            </span>
        
        <div class="match-item">
            <span class="match-label">Results Found</span>
            <span class="match-value">${data.results.length}</span>
        </div>
    `;

    if (data.reason) {
        matchHtml += `
            <div class="match-reason">
                ⚠️ ${data.reason}
            </div>
        `;
    }

    // Warning when selected vulnerability does not match selected category
    if (input.vuln_type && data.results.length > 0) {
        const allMissingVuln = data.results.every(m =>
            m.missing_features.some(f => f.includes('Vulnerability Type'))
        );
        if (allMissingVuln) {
            matchHtml += `
                <div class="match-reason">
                    ⚠️ Note: '${input.vuln_type}' was not found in any recommended machine. 
                    This vulnerability may not be common in '${input.attack_categories.join(', ')}' 
                    machines at '${input.difficulty}' difficulty.
                </div>
            `;
        }
    }

    matchBar.innerHTML = matchHtml;

    // ── RESULTS GRID ─

    const resultsGrid = document.getElementById('resultsGrid');

    if (!data.results || data.results.length === 0) {
        resultsGrid.innerHTML = `
            <div class="no-results">
                <p>No machines found for this combination.</p>
                <p>Try changing your preferences or selecting All Platforms.</p>
                <a href="recommend.html" class="btn btn-primary" style="margin-top:1rem;">
                    Try Again
                </a>
            </div>
        `;
    } else {
        data.results.forEach(machine => {
            const tierColors = {
                'Perfect Match': { bg: '#f0fdf4', border: '#86efac', badge: '#16a34a' },
                'Partial Match': { bg: '#fffbeb', border: '#fcd34d', badge: '#d97706' },
                'Fallback':      { bg: '#fff7ed', border: '#fdba74', badge: '#ea580c' }
            };
            const tc = tierColors[machine.tier] || tierColors['Partial Match'];

            // Matched features html
            const matchedHtml = machine.matched_features.map(f => `
                <div class="feature-item feature-matched">
                    <span class="feature-icon">✅</span>
                    <span>${f}</span>
                </div>
            `).join('');

          
            // Missing features html
            const missingHtml = machine.missing_features.length > 0 ? `
                <div class="missing-section">
                    <div class="missing-title">Not found — features requested by you:</div>
                    ${machine.missing_features.map(f => {
                        // Extract just the feature name from the message
                        
                        const typeMatch = f.match(/^\[([^\]]+)\]/);
                        const featureType = typeMatch ? typeMatch[1] : 'Feature';

                        // Extract feature name from single quotes e.g. 'SQL Injection'
                        const match = f.match(/'([^']+)'/);
                        const featureName = match ? match[1] : f;
                        
                        // Check if message contains extra info about what machine has
                        const extraInfoMatch = f.match(/(?:This machine (?:has|starts with)|this machine takes)[: ] *'?([^']+)'?$/i);
                        const extraInfo = extraInfoMatch ? extraInfoMatch[1] : null;

                        return `
                            <div class="feature-item feature-missing">
                                <span class="feature-icon">❌</span>
                                <div>
                                    <span><strong>${featureType}:</strong> ${featureName} — not found in this machine</span>
                                    ${extraInfo ? `<div style="font-size:0.78rem; color:#64748b; margin-top:0.2rem;">↳ ${extraInfo}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            ` : '';

            

            // Skills required
            const skills = machine.skills_required
                ? machine.skills_required.split(';').map(s => s.trim()).filter(Boolean)
                : [];
            const skillsHtml = skills.map(s =>
                `<span class="skill-tag">${s}</span>`
            ).join('');

            // Learning objectives
            const objectives = machine.learning_objectives
                ? machine.learning_objectives.split(';').map(s => s.trim()).filter(Boolean)
                : [];
            const objectivesHtml = objectives.map(o =>
                `<span class="skill-tag obj-tag">${o}</span>`
            ).join('');

            resultsGrid.innerHTML += `
                <div class="machine-card-light fade-in" style="border-color:${tc.border}; background:${tc.bg};">

                    <!-- CARD HEADER -->
                    <div class="machine-card-header">
                        <div class="machine-rank-badge">#${machine.rank}</div>
                        <div class="machine-title-group">
                            <h3 class="machine-name-light">${machine.machine_name}</h3>
                            <div class="machine-badges">
                                <span class="badge badge-${machine.difficulty.toLowerCase()}">${machine.difficulty}</span>
                                <span class="tier-badge" style="background:${tc.badge}20; color:${tc.badge}; border:1px solid ${tc.badge}40;">
                                    ${machine.tier}
                                </span>
                            </div>
                        </div>
                        <div class="relevance-circle">
                            <span class="relevance-number">${machine.relevance_score}%</span>
                            <span class="relevance-label">Relevance</span>
                        </div>
                    </div>

                    <!-- QUICK INFO -->
                    <div class="machine-quick-info">
                        <span class="quick-item">🖥️ ${machine.os}</span>
                        <span class="quick-item">🌐 ${machine.platform}</span>
                        <span class="quick-item">⏱️ ${machine.estimated_time}</span>
                        <span class="quick-item">🎯 ${machine.attack_category}</span>
                        <span class="quick-item">📊 Learning Objective Match: ${machine.objective_match}</span>
                    </div>

                    <!-- MATCH SUMMARY -->
                    <div class="match-summary-section">
                        ${matchedHtml ? `<div class="features-group">${matchedHtml}</div>` : ''}
                        ${missingHtml ? `<div class="features-group">${missingHtml}</div>` : ''}
                    </div>

                    <!-- ADDITIONAL INFO -->
                    <details class="additional-info">
                        <summary>Additional Machine Info</summary>
                        <div class="additional-content">

                            <div class="info-row">
                                <span class="info-label">Entry Point</span>
                                <span class="info-value">${machine.entry_point}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Attack Path Length</span>
                                <span class="info-value">${machine.attack_path_length} steps</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">RF Predicted Difficulty</span>
                                <span class="info-value">
                                    <span class="badge badge-${machine.rf_predicted_difficulty.toLowerCase()}">
                                        ${machine.rf_predicted_difficulty}
                                    </span>
                                </span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Vulnerability Chain</span>
                                <span class="info-value">${machine.vulnerability_type}</span>
                            </div>

                            ${skills.length > 0 ? `
                            <div class="info-row">
                                <span class="info-label">Skills Required</span>
                                <div class="tags-row">${skillsHtml}</div>
                            </div>` : ''}

                            ${objectives.length > 0 ? `
                            <div class="info-row">
                                <span class="info-label">Learning Objectives</span>
                                <div class="tags-row">${objectivesHtml}</div>
                            </div>` : ''}

                        </div>
                    </details>

                </div>
            `;
        });
    }
  </script>
</body>
</html>
